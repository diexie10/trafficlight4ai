name: Linux Build

on:
  push:
    branches:
      - main
      - fix/linux-ci-build
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            image: ubuntu:24.04
            install: |
              apt-get update
              apt-get install -y git cmake g++ qt6-base-dev qt6-multimedia-dev qt6-tools-dev
          - name: Fedora
            image: fedora:41
            install: |
              dnf install -y git cmake gcc-c++ qt6-qtbase-devel qt6-qtmultimedia-devel qt6-qttools-devel
          - name: Arch
            image: archlinux:latest
            install: |
              pacman -Syu --noconfirm git base-devel cmake qt6-base qt6-multimedia qt6-tools
          - name: openSUSE
            image: opensuse/leap:15.6
            install: |
              zypper --non-interactive --gpg-auto-import-keys refresh
              zypper --non-interactive install git cmake gcc-c++ qt6-base-devel qt6-multimedia-devel qt6-tools-devel qt6-tools-linguist

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Verify executables
        run: |
          test -x build/src/trafficlight4ai
          test -x build/tools/tl4ai-ctl

      - name: Test
        run: ctest --test-dir build --output-on-failure
