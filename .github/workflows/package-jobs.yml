name: Package Jobs

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      platform:
        required: false
        type: string
        default: "all"

permissions:
  contents: read

jobs:
  windows:
    name: Windows zip
    if: contains(fromJSON('["all","windows"]'), inputs.platform)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: "qtmultimedia"
          cache: true

      - name: Configure
        run: >
          cmake -S . -B build-windows
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build-windows --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          New-Item -ItemType Directory -Force windows-package/bin, windows-package/docs | Out-Null
          Copy-Item build-windows/src/Release/trafficlight4ai.exe windows-package/bin/
          Copy-Item build-windows/tools/Release/tl4ai-ctl.exe windows-package/bin/
          Copy-Item README.md, README_zh.md, LICENSE windows-package/docs/
          windeployqt --release --dir windows-package/bin windows-package/bin/trafficlight4ai.exe
          windeployqt --release --dir windows-package/bin windows-package/bin/tl4ai-ctl.exe
          Compress-Archive -Path windows-package/* -DestinationPath "trafficlight4ai-$version-windows-amd64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: trafficlight4ai-${{ inputs.version }}-windows-amd64
          path: trafficlight4ai-${{ inputs.version }}-windows-amd64.zip
          if-no-files-found: error

  ubuntu-deb:
    name: Ubuntu deb
    if: contains(fromJSON('["all","ubuntu"]'), inputs.platform)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ dpkg-dev libgl1-mesa-dev qt6-base-dev qt6-l10n-tools qt6-multimedia-dev qt6-tools-dev qt6-tools-dev-tools

      - name: Build package
        run: packaging/linux/build-deb.sh "${{ inputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: trafficlight4ai-${{ inputs.version }}-linux-amd64-deb
          path: dist/release/trafficlight4ai-${{ inputs.version }}-linux-amd64.deb
          if-no-files-found: error

  fedora-rpm:
    name: Fedora rpm
    if: contains(fromJSON('["all","fedora"]'), inputs.platform)
    runs-on: ubuntu-latest
    container:
      image: fedora:41

    steps:
      - name: Install dependencies
        run: dnf install -y git cmake gcc-c++ rpm-build qt6-qtbase-devel qt6-qtmultimedia-devel qt6-qttools-devel

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build package
        run: packaging/linux/build-rpm.sh "${{ inputs.version }}" fedora

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: trafficlight4ai-${{ inputs.version }}-fedora-amd64-rpm
          path: dist/release/trafficlight4ai-${{ inputs.version }}-fedora-amd64.rpm
          if-no-files-found: error

  opensuse-rpm:
    name: openSUSE rpm
    if: contains(fromJSON('["all","opensuse"]'), inputs.platform)
    runs-on: ubuntu-latest
    container:
      image: opensuse/leap:15.6

    steps:
      - name: Install dependencies
        run: |
          zypper --non-interactive --gpg-auto-import-keys refresh
          zypper --non-interactive install git cmake rpm-build gcc13 gcc13-c++ qt6-base-devel qt6-multimedia-devel qt6-tools-devel qt6-linguist-devel

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build package
        run: packaging/linux/build-rpm.sh "${{ inputs.version }}" opensuse dist/release gcc-13 g++-13

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: trafficlight4ai-${{ inputs.version }}-opensuse-amd64-rpm
          path: dist/release/trafficlight4ai-${{ inputs.version }}-opensuse-amd64.rpm
          if-no-files-found: error

  arch-package:
    name: Arch pkg.tar.zst
    if: contains(fromJSON('["all","arch"]'), inputs.platform)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git base-devel cmake qt6-base qt6-multimedia qt6-tools

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build package
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c "cd '$GITHUB_WORKSPACE' && packaging/linux/build-arch-pkg.sh '${{ inputs.version }}'"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: trafficlight4ai-${{ inputs.version }}-arch-amd64-pkg
          path: dist/release/trafficlight4ai-${{ inputs.version }}-arch-amd64.pkg.tar.zst
          if-no-files-found: error

  appimage:
    name: AppImage
    if: contains(fromJSON('["all","appimage"]'), inputs.platform)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ curl desktop-file-utils file libfuse2 libgl1-mesa-dev patchelf qt6-base-dev qt6-l10n-tools qt6-multimedia-dev qt6-tools-dev qt6-tools-dev-tools

      - name: Build package
        run: packaging/linux/build-appimage.sh "${{ inputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: trafficlight4ai-${{ inputs.version }}-linux-amd64-appimage
          path: dist/release/trafficlight4ai-${{ inputs.version }}-linux-amd64.AppImage
          if-no-files-found: error

  macos:
    name: macOS arm64 zip
    if: contains(fromJSON('["all","macos"]'), inputs.platform)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install cmake qt
          echo "$(brew --prefix qt)/bin" >> "$GITHUB_PATH"
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt)" >> "$GITHUB_ENV"

      - name: Build package
        run: packaging/macos/build-zip.sh "${{ inputs.version }}" arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: trafficlight4ai-${{ inputs.version }}-macos-arm64
          path: dist/release/trafficlight4ai-${{ inputs.version }}-macos-arm64.zip
          if-no-files-found: error
