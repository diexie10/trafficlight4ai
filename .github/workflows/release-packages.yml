name: Release Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true
        default: "0.3.0"
      notes:
        description: Release notes (leave empty to auto-generate from commits)
        required: false
        default: ""

permissions:
  contents: read

jobs:
  packages:
    uses: ./.github/workflows/package-jobs.yml
    with:
      version: ${{ inputs.version }}
      platform: "all"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: packages
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -maxdepth 3 -type f -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum trafficlight4ai-* > SHA256SUMS.txt
          ls -la

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ inputs.version }}"
          tag="v${version}"
          if git ls-remote --tags origin "${tag}" | grep -q .; then
              echo "Tag ${tag} already exists" >&2
              exit 1
          fi
          notes="${{ inputs.notes }}"
          if [ -z "${notes}" ]; then
              gh release create "${tag}" release-assets/* \
                  --repo "${{ github.repository }}" \
                  --target "${{ github.sha }}" \
                  --title "trafficlight4ai ${version}" \
                  --generate-notes
          else
              gh release create "${tag}" release-assets/* \
                  --repo "${{ github.repository }}" \
                  --target "${{ github.sha }}" \
                  --title "trafficlight4ai ${version}" \
                  --notes "${notes}"
          fi
